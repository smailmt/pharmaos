name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pharmaos
          POSTGRES_PASSWORD: pharmaos_dev
          POSTGRES_DB: pharmaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          APP_ENV: test
          SECRET_KEY: ci-secret-key-min-32-chars-long-for-testing-only
          POSTGRES_USER: pharmaos
          POSTGRES_PASSWORD: pharmaos_dev
          POSTGRES_DB: pharmaos_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (TypeScript + Vite)
        working-directory: frontend
        run: npm run build
