services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pharmaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmaos_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pharmaos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmaos}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars-long-abcdefghij}
      POSTGRES_USER: ${POSTGRES_USER:-pharmaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmaos_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pharmaos}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
